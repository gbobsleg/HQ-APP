<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Pilotage Campagne | HQ-APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="js/pdfBilan.js"></script>
    <script src="js/version.js"></script>
    <script src="js/update.js"></script>
    <script src="js/load-optional-config.js" data-next="../config/agents.js,doc-modal.js,nav.js,../config/config_grille.js,https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/GridRepository.js"></script>
    <script src="js/FileSystemManager.js"></script>
    <script src="js/ScoringEngine.js"></script>
    <script src="js/ReviewEngine.js"></script>
    <script src="js/DashboardChartsView.js"></script>
    <script src="js/ScrollView.js"></script>
    <script src="js/EvaluationEngineFactory.js"></script>
    <script src="js/AnalyticsEngineFactory.js"></script>
    <script src="js/AppOrchestrator.js"></script>
    <style>[x-cloak] { display: none !important; } html { scrollbar-gutter: stable; }</style>
</head>
<body x-cloak class="bg-slate-50 min-h-screen text-slate-800" x-data="app()" x-init="init()">

    <nav class="bg-indigo-900 text-white p-4 shadow-lg" x-data="navComponent" x-html="template"></nav>

    <div :class="isInitializing ? 'opacity-0' : 'opacity-100'" class="transition-opacity duration-300 flex h-[calc(100vh-68px)]">
        <!-- SIDEBAR -->
        <aside class="w-80 bg-white border-r border-slate-200 p-8 overflow-y-auto">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 italic">Campagnes Régionales</h3>
            <nav class="space-y-3">
                <template x-for="folder in folders" :key="folder.name">
                    <button @click="loadCampaign(folder)" 
                         :class="selectedFolder === folder.name ? 'bg-indigo-600 text-white shadow-lg' : (folder.status === 'closed' ? 'bg-slate-100/80 hover:bg-slate-100 text-slate-600' : 'hover:bg-slate-50 text-slate-600')"
                         class="w-full text-left p-4 rounded-2xl transition-all flex items-center gap-3 group">
                        <span class="shrink-0 text-base" :title="folder.campaignType === 'review' ? 'Entretien' : 'Scoring'" x-text="folder.campaignType === 'review' ? '🗣️' : '📊'"></span>
                        <span class="font-bold text-sm truncate flex-1 min-w-0" x-text="folder.name"></span>
                        <span x-show="folder.status === 'closed'" class="shrink-0 bg-gray-200 text-gray-700 text-[10px] font-bold px-2 py-0.5 rounded">Clôturée</span>
                        <span x-show="folder.status !== 'closed'" class="text-lg opacity-0 group-hover:opacity-100 transition-opacity shrink-0">→</span>
                    </button>
                </template>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 p-8 overflow-y-auto bg-slate-50 relative">
            <div x-show="selectedFolder && isLoadingCampaign" class="flex-1 flex flex-col items-center justify-center text-slate-500">
                <svg class="animate-spin h-10 w-10 text-indigo-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-lg font-medium">Chargement de la campagne en cours...</p>
            </div>
            <template x-if="selectedFolder && !isLoadingCampaign">
                <div class="space-y-6 animate-in fade-in duration-500 h-full flex flex-col">
                    <!-- Bandeau campagne clôturée -->
                    <div x-show="isCampaignClosed" class="bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-xl text-sm font-bold text-center">
                        Campagne clôturée – Mode lecture seule
                    </div>
                    <!-- HEADER -->
                    <header class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div class="flex items-center gap-3">
                            <div>
                                <h2 class="text-3xl font-black text-indigo-900 tracking-tight" x-text="selectedFolder"></h2>
                                <p x-show="campaignConfig && campaignConfig.period_start" class="text-slate-500 text-sm mt-1" x-text="(campaignConfig && campaignConfig.period_start) ? ('Période évaluée : du ' + formatDateToFR(campaignConfig.period_start) + ' au ' + formatDateToFR(campaignConfig.period_end)) : ''"></p>
                                <p class="text-slate-500 font-medium mt-1 uppercase text-xs tracking-widest">Pilotage Opérationnel</p>
                            </div>
                            <button type="button" @click.prevent="$store.docModal.open = true; $store.docModal.hash = '#pilotage'" class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-100 hover:bg-indigo-100 text-slate-500 hover:text-indigo-600 text-xs font-bold transition-colors" title="Aide : Pilotage">?</button>
                        </div>
                        <div class="flex items-center gap-6">
                            <div x-show="pilotageSupervisorOptions.length > 0" class="flex items-center gap-2">
                                <label class="text-xs font-bold text-slate-500 uppercase" for="pilotage-supervisor">Superviseur</label>
                                <select id="pilotage-supervisor" x-model="pilotageFilterSupervisorId"
                                        @change="localStorage.setItem('pilotage_supervisor', pilotageFilterSupervisorId); refreshWorkflow()"
                                        class="text-sm font-medium border border-slate-200 rounded-xl px-3 py-2 bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500">
                                    <option value="">Tous les agents</option>
                                    <template x-for="opt in pilotageSupervisorOptions" :key="opt.id">
                                        <option :value="opt.id" x-text="opt.nom"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="flex items-center gap-2">
                                <label class="text-xs font-bold text-slate-500 uppercase sr-only" for="pilotage-search-agent">Chercher un agent</label>
                                <input id="pilotage-search-agent" type="search" x-model="pilotageSearchAgent" placeholder="Chercher un agent..."
                                       class="text-sm font-medium border border-slate-200 rounded-xl pl-3 pr-3 py-2 bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 w-48"
                                       aria-label="Chercher un agent par nom ou site">
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold text-slate-400 uppercase">Avancement</p>
                                <p class="text-xl font-black text-indigo-600" x-text="pilotageProgressPercent + '%'"></p>
                            </div>
                        </div>
                    </header>

                    <!-- WORKFLOW COLUMNS -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1 min-h-0">
                        
                        <!-- 1. EN COURS D'EVALUATION -->
                        <div class="bg-slate-100/50 p-4 rounded-3xl border border-slate-200/60 flex flex-col">
                            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                                En Cours d'Évaluation
                                <span class="ml-auto bg-slate-200 text-slate-600 px-2 py-0.5 rounded text-[10px]" x-text="pilotageFilterAgents(workflow.pending).length"></span>
                            </h3>
                            <div class="space-y-3 overflow-y-auto flex-1 pr-2">
                                <template x-for="(agent, index) in pilotageFilterAgents(workflow.pending)" :key="'pending-' + index">
                                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow group">
                                        <div class="flex justify-between items-start mb-3">
                                            <div>
                                                <h4 class="font-bold text-slate-700 text-sm" x-text="agent.name"></h4>
                                                <p class="text-[10px] text-slate-400 uppercase" x-text="agent.site"></p>
                                            </div>
                                            <span class="text-xs font-black bg-slate-100 text-slate-600 px-2 py-1 rounded-lg" x-text="agent.count + ' / ' + (campaignTargetEvals ?? 3)"></span>
                                        </div>
                                        
                                        <!-- Progress Bar -->
                                        <div class="w-full bg-slate-100 rounded-full h-1.5 mb-4">
                                            <div class="bg-indigo-500 h-1.5 rounded-full" :style="'width: ' + ((campaignTargetEvals && campaignTargetEvals > 0) ? Math.min(100, (agent.count / campaignTargetEvals) * 100) : 0) + '%'"></div>
                                        </div>

                                        <a x-show="!isCampaignClosed" :href="'saisie.html?agent=' + encodeURIComponent(agent.name) + '&campagne=' + encodeURIComponent(selectedFolder)" 
                                           class="w-full block text-center bg-slate-50 hover:bg-indigo-50 text-slate-700 hover:text-indigo-700 font-bold text-xs py-2 rounded-lg transition-colors border border-slate-100">
                                            📝 Évaluer
                                        </a>
                                        <a x-show="isCampaignClosed" :href="'saisie.html?agent=' + encodeURIComponent(agent.name) + '&campagne=' + encodeURIComponent(selectedFolder)" 
                                           class="w-full block text-center bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs py-2 rounded-lg transition-colors border border-slate-200"
                                           title="Consulter le dossier en lecture seule">
                                            Consulter
                                        </a>
                                    </div>
                                </template>
                                <template x-if="pilotageFilterAgents(workflow.pending).length === 0">
                                    <div class="text-center py-10 text-slate-400 italic text-sm">Aucun agent en attente.</div>
                                </template>
                            </div>
                        </div>

                        <!-- 2. PRÊT POUR BILAN / BROUILLONS -->
                        <div class="bg-indigo-50/50 p-4 rounded-3xl border border-indigo-100 flex flex-col">
                            <h3 class="text-xs font-black text-indigo-900 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
                                À Bilanter
                                <span class="ml-auto bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-[10px]" x-text="pilotageFilterAgents(workflow.ready).length"></span>
                            </h3>
                            <div class="space-y-3 overflow-y-auto flex-1 pr-2">
                                <template x-for="(agent, index) in pilotageFilterAgents(workflow.ready)" :key="'ready-' + index">
                                    <div>
                                        <template x-if="!isCampaignClosed">
                                            <a :href="'saisie.html?agent=' + encodeURIComponent(agent.name) + '&campagne=' + encodeURIComponent(selectedFolder) + '&tab=bilan'" class="block bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-amber-400 border-y border-r border-slate-100 hover:shadow-md transition-shadow cursor-pointer">
                                                <div class="flex justify-between items-start mb-2">
                                                    <div>
                                                        <h4 class="font-bold text-slate-800 text-sm" x-text="agent.name"></h4>
                                                        <p class="text-[10px] text-slate-400 uppercase" x-text="agent.site"></p>
                                                    </div>
                                                    <template x-if="agent.hasDraft">
                                                        <span class="text-[10px] font-bold bg-amber-100 text-amber-700 px-2 py-1 rounded border border-amber-200">
                                                            ✏️ BROUILLON
                                                        </span>
                                                    </template>
                                                    <template x-if="!agent.hasDraft">
                                                        <span class="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded border border-indigo-200">
                                                            ⏳ EN ATTENTE
                                                        </span>
                                                    </template>
                                                </div>
                                                
                                                <div class="text-xs text-slate-500 mt-2 mb-3" x-show="campaignType !== 'review'">
                                                    Moyenne : <span class="font-black" :class="agent.avg >= 5 ? 'text-emerald-600' : 'text-rose-600'" x-text="agent.avg"></span>
                                                </div>
                                                <div x-show="campaignType !== 'review'">
                                                    <span class="block w-full text-center bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 text-xs font-bold py-2.5 rounded-lg transition-colors">
                                                        ✍️ Rédiger le bilan
                                                    </span>
                                                </div>
                                            </a>
                                        </template>
                                        <template x-if="isCampaignClosed">
                                            <a :href="'saisie.html?agent=' + encodeURIComponent(agent.name) + '&campagne=' + encodeURIComponent(selectedFolder) + '&tab=bilan'" class="block bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-slate-300 border-y border-r border-slate-100 opacity-90 hover:opacity-100 transition-opacity">
                                                <div class="flex justify-between items-start mb-2">
                                                    <div>
                                                        <h4 class="font-bold text-slate-700 text-sm" x-text="agent.name"></h4>
                                                        <p class="text-[10px] text-slate-400 uppercase" x-text="agent.site"></p>
                                                    </div>
                                                </div>
                                                <div class="text-xs text-slate-500 mt-2" x-show="campaignType !== 'review'">Moyenne : <span class="font-black" :class="agent.avg >= 5 ? 'text-emerald-600' : 'text-rose-600'" x-text="agent.avg"></span></div>
                                                <p class="text-[10px] text-indigo-500 font-bold mt-2">Consulter le dossier →</p>
                                            </a>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="pilotageFilterAgents(workflow.ready).length === 0">
                                    <div class="text-center py-10 text-slate-400 italic text-sm">Tout est à jour !</div>
                                </template>
                            </div>
                        </div>

                        <!-- 3. CLÔTURÉS -->
                        <div class="bg-emerald-50/30 p-4 rounded-3xl border border-emerald-100/50 flex flex-col">
                            <h3 class="text-xs font-black text-emerald-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                                Clôturés / Envoyés
                                <span class="ml-auto bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[10px]" x-text="pilotageFilterAgents(workflow.done).length"></span>
                            </h3>
                            <div class="space-y-3 overflow-y-auto flex-1 pr-2">
                                <template x-for="(agent, index) in pilotageFilterAgents(workflow.done)" :key="'done-' + index">
                                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 opacity-75 hover:opacity-100 transition-opacity">
                                        <div class="flex justify-between items-center mb-2">
                                            <h4 class="font-bold text-slate-700 text-sm" x-text="agent.name"></h4>
                                            <span class="text-lg">✅</span>
                                        </div>
                                        <div class="text-[10px] text-slate-400 flex items-center gap-2">
                                            <span>📅 Envoyé le : <span x-text="new Date(agent.sentDate).toLocaleDateString()"></span></span>
                                        </div>
                                        <div class="flex items-center gap-2 mt-4">
                                            <a :href="'saisie.html?agent=' + encodeURIComponent(agent.name) + '&campagne=' + encodeURIComponent(selectedFolder) + '&tab=bilan'"
                                               class="flex-1 flex justify-center items-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2 px-2 rounded-lg transition-colors">
                                                👁️ Consulter
                                            </a>
                                            <button @click="remettreAgentABilanter(agent.name)"
                                                    class="flex-1 flex justify-center items-center gap-1.5 bg-white border border-amber-200 hover:bg-amber-50 text-amber-700 text-xs font-bold py-2 px-2 rounded-lg transition-colors"
                                                    title="Remettre l'agent dans la colonne À bilanter">
                                                ↩️ À bilanter
                                            </button>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="pilotageFilterAgents(workflow.done).length === 0">
                                    <div class="text-center py-10 text-slate-400 italic text-sm">Aucun bilan envoyé.</div>
                                </template>
                            </div>
                        </div>

                    </div>
                </div>
            </template>

            <template x-if="!selectedFolder">
                <div class="h-full flex flex-col items-center justify-center text-slate-300">
                    <div class="bg-white p-12 rounded-[3rem] shadow-xl text-center border border-slate-50">
                        <span class="text-8xl mb-6 block grayscale">🚀</span>
                        <p class="text-xl font-bold text-slate-400">Pilotage Campagne</p>
                        <p class="text-sm mt-2">Sélectionnez une campagne pour gérer les flux.</p>
                    </div>
                </div>
            </template>
        </main>
    </div>
</body>
</html>

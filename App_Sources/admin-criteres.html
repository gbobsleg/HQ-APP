<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Gestion Grille | HQ-APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/doc-modal.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/version.js"></script>
    <script src="js/update.js"></script>
    <script src="js/GridRepository.js"></script>
    <script src="js/FileSystemManager.js"></script>
    <script src="js/ScoringEngine.js"></script>
    <script src="js/ReviewEngine.js"></script>
    <script src="js/DashboardChartsView.js"></script>
    <script src="js/ScrollView.js"></script>
    <script src="js/EvaluationEngineFactory.js"></script>
    <script src="js/AnalyticsEngineFactory.js"></script>
    <script src="js/AppOrchestrator.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        html { scrollbar-gutter: stable; }
    </style>
</head>
<body x-cloak class="bg-slate-50 min-h-screen" x-data="app()" x-init="init()">
    <nav class="bg-indigo-900 text-white p-4 shadow-lg" x-data="navComponent" x-html="template"></nav>

    <main :class="isInitializing ? 'opacity-0' : 'opacity-100'" class="transition-opacity duration-300 max-w-6xl mx-auto py-10 px-6">
        <div x-show="isAdminCriteresPage && !rootHandle" class="mb-6 p-4 rounded-2xl bg-slate-100 border border-slate-200 text-slate-600 font-medium">
            Connectez le dossier racine pour gérer les grilles (bouton Rafraîchir ou Connexion en haut).
        </div>
        <div x-show="editingGridContext && editingGridContext.type === 'campaign'" class="mb-6 p-4 rounded-2xl bg-amber-50 border border-amber-200 text-amber-800 font-medium">
            Vous modifiez la grille de la campagne <span x-text="editingGridContext ? editingGridContext.campaignName : ''"></span>. Les changements ne concernent que cette campagne.
        </div>
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div>
                    <a href="admin-referentiels.html" class="text-indigo-600 font-bold text-xs uppercase tracking-widest hover:underline">← Retour Référentiels</a>
                    <h1 class="text-3xl font-black text-indigo-900 mt-2">Configuration de la Grille</h1>
                </div>
                <button type="button" @click.prevent="$store.docModal.open = true; $store.docModal.hash = '#admin-grille'" class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-100 hover:bg-indigo-100 text-slate-500 hover:text-indigo-600 text-xs font-bold transition-colors" title="Aide : Grille">?</button>
            </div>
            <div x-show="!editingGridContext || editingGridContext.type === 'source'" class="flex items-center gap-4">
                <label class="text-[10px] font-black text-slate-400 uppercase">Grille</label>
                <select :value="currentGridId" @change="selectGridToEdit($event.target.value)" class="bg-slate-50 border-2 border-slate-100 px-4 py-2 rounded-xl font-bold text-sm">
                    <template x-for="g in grillesList" :key="g.id">
                        <option :value="g.id" x-text="g.title || g.id"></option>
                    </template>
                    <option value="default" x-show="grillesList.length === 0">default</option>
                </select>
                <button @click="createNewGrid()" class="bg-white border-2 border-indigo-200 hover:border-indigo-400 text-indigo-700 font-bold px-4 py-2 rounded-xl text-sm">Nouvelle grille</button>
                <button @click="duplicateGrid()" class="bg-white border-2 border-slate-200 hover:border-slate-400 text-slate-700 font-bold px-4 py-2 rounded-xl text-sm">Dupliquer</button>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-slate-100 shadow-sm">
                    <span class="w-2 h-2 rounded-full" 
                          :class="saveStatus === 'Enregistré' ? 'bg-emerald-500' : (saveStatus === 'Erreur' ? 'bg-rose-500' : 'bg-amber-500 animate-pulse')">
                    </span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-500" x-text="saveStatus"></span>
                </div>
                <button @click="saveGridConfig()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-8 py-4 rounded-2xl shadow-lg transition-all flex items-center gap-2 text-sm">
                    <span>💾</span> FORCER SAUVEGARDE
                </button>
            </div>
        </div>

        <div class="space-y-6 category-list">
            <template x-for="(category, catIndex) in grid" :key="catIndex">
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden category-item">
                    <div class="bg-slate-50 p-4 border-b flex justify-between items-center">
                        <div class="flex items-center gap-4 flex-1">
                            <div class="flex flex-col gap-0 border-r pr-3 border-slate-200">
                                <button @click="moveCategory(catIndex, -1)" :disabled="catIndex === 0" class="text-slate-400 hover:text-indigo-600 disabled:opacity-20 text-xs leading-none p-1">▲</button>
                                <button @click="moveCategory(catIndex, 1)" :disabled="catIndex === grid.length - 1" class="text-slate-400 hover:text-indigo-600 disabled:opacity-20 text-xs leading-none p-1">▼</button>
                            </div>

                            <button @click="toggleCategory(catIndex)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm hover:bg-indigo-50 transition-colors text-indigo-600 font-bold">
                                <span x-text="category.collapsed ? '+' : '-'"></span>
                            </button>

                            <input type="text" x-model="category.cat" class="bg-transparent font-black text-indigo-900 uppercase tracking-widest outline-none border-b border-transparent focus:border-indigo-300 flex-1">
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-bold text-slate-400" x-text="category.items.length + ' critères'"></span>
                            <button @click="deleteCategory(catIndex)" class="text-rose-400 hover:text-rose-600 text-[10px] font-black uppercase tracking-tighter">Supprimer</button>
                        </div>
                    </div>

                    <div x-show="!category.collapsed" x-collapse class="p-6 space-y-4">
                        <template x-for="(item, itemIndex) in category.items" :key="item.id">
                            <div class="grid grid-cols-12 gap-4 items-start bg-slate-50/50 p-4 rounded-2xl border border-slate-100 relative group">
                                <div class="col-span-1 pt-6 flex flex-col items-center gap-0 border-r pr-2 border-slate-200">
                                    <button type="button" @click="moveItem(catIndex, itemIndex, -1)" :disabled="itemIndex === 0" class="text-slate-400 hover:text-indigo-600 disabled:opacity-20 text-xs leading-none p-1">▲</button>
                                    <button type="button" @click="moveItem(catIndex, itemIndex, 1)" :disabled="itemIndex === category.items.length - 1" class="text-slate-400 hover:text-indigo-600 disabled:opacity-20 text-xs leading-none p-1">▼</button>
                                </div>
                                <div class="col-span-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Type</label>
                                    <select x-model="item.type" class="w-full bg-white border p-2 rounded-xl text-sm font-bold text-slate-700 shadow-sm">
                                        <option value="scoring">Points</option>
                                        <option value="textarea">Texte</option>
                                        <option value="boolean">Oui/Non</option>
                                    </select>
                                </div>
                                <div class="col-span-2">
                                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Libellé</label>
                                    <input type="text" x-model="item.label" class="w-full bg-white border p-2 rounded-xl text-sm font-bold shadow-sm">
                                </div>
                                <div class="col-span-1" x-show="item.type === 'scoring' || !item.type">
                                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Max</label>
                                    <input type="number" x-model.number="item.max" class="w-full bg-white border p-2 rounded-xl text-sm text-center font-black text-indigo-600 shadow-sm" @input="ensureStepForMax(item); updateNote()">
                                </div>
                                <div class="col-span-1" x-show="item.type === 'scoring' || !item.type">
                                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Pas</label>
                                    <select class="w-full bg-white border p-2 rounded-xl text-sm text-center font-bold text-indigo-600 shadow-sm"
                                            @change="item.step = parseFloat($event.target.value)">
                                        <template x-for="opt in getStepOptions(item.max)" :key="opt">
                                            <option :value="opt" :selected="opt === item.step" x-text="opt"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="col-span-4">
                                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Attendu (Tooltip)</label>
                                    <textarea x-model="item.hint" class="w-full bg-white border p-2 rounded-xl text-xs shadow-sm transition-all duration-300 h-10 focus:h-32 min-h-[2.5rem]"></textarea>
                                </div>
                                <div class="col-span-1 flex flex-col items-center">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Oblig.</label>
                                    <input type="checkbox" x-model="item.oblig" class="mt-3 w-5 h-5 accent-indigo-600 rounded-lg">
                                </div>
                                <div class="col-span-1 pt-6 text-right">
                                    <button @click="deleteItem(catIndex, itemIndex)" class="text-rose-300 hover:text-rose-500 transition-colors text-xl">✕</button>
                                </div>
                            </div>
                        </template>
                        <button @click="addItem(catIndex)" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold text-xs hover:bg-white hover:border-indigo-300 transition-all italic mt-4">
                            + Ajouter un critère dans cette rubrique
                        </button>
                    </div>
                </div>
            </template>

            <button @click="addCategory()" class="w-full py-8 border-4 border-dashed border-indigo-100 rounded-[2.5rem] text-indigo-300 font-black text-lg hover:bg-indigo-50 hover:border-indigo-200 transition-all uppercase tracking-tighter">
                ➕ Créer une nouvelle rubrique principale
            </button>
        </div>
    </main>
</body>
</html>
